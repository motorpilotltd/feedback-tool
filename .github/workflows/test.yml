name: Test
on:
  - push
permissions:
  contents: read
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        operating-system:
          - ubuntu-latest
        php-version:
          - '8.3'
          - '8.4'
          - '8.5'
        database:
          - sqlite
          - mysql
    name: php ${{ matrix.php-version }} / ${{ matrix.database }} on ${{ matrix.operating-system }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: feedback_tool_testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    runs-on: ${{ matrix.operating-system }}
    steps:
      # Install local deps if this action is being run locally
      - name: Install local dependencies
        if: env.ACT
        run: |
          sudo apt-get update
          sudo apt-get -yqq install mysql-client
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: bcmath, ctype, fileinfo, json, mbstring, openssl, pdo, tokenizer, xml
          coverage: none
      - name: Prepare the environment
        run: cp .env.ci.example .env
      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Setup composer cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install composer dependencies
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
        run: composer install --no-ansi --no-interaction --no-progress --prefer-dist
      - name: Generate application key
        run: php artisan key:generate
      # Laravel loads the squashed schema dump via the `mysql` client binary.
      - name: Ensure MySQL client is available
        if: matrix.database == 'mysql'
        run: sudo apt-get update && sudo apt-get -yqq install mysql-client
      # The suite runs against both SQLite (default, fast, in-memory) and MySQL
      # (mirrors production). phpunit.xml forces SQLite; phpunit.mysql.xml forces
      # MySQL against a dedicated testing database.
      - name: Run tests (SQLite)
        if: matrix.database == 'sqlite'
        run: vendor/bin/pest
      - name: Run tests (MySQL)
        if: matrix.database == 'mysql'
        run: vendor/bin/pest -c phpunit.mysql.xml
